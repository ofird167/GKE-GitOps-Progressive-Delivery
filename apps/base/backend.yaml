apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    canary:
      canaryService: backend-canary-service
      stableService: backend-service
      trafficRouting:
        istio:
          virtualService:
            name: app-virtualservice
            routes:
              - primary
      steps:
        - setWeight: 20
        - pause: { duration: 30m }
        - setWeight: 100
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: api-backend
          image: backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v1-stable"
            - name: CONFIG_MAP_VAL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CONFIG_MAP_VAL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-name
            - name: BACKEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: backend-api-key
            - name: DB_HOST
              value: postgres-service
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: backend-canary-service
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app: backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["get", "list", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: backend-sa
roleRef:
  kind: Role
  name: backend-pod-reader
  apiGroup: rbac.authorization.k8s.io

