apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secret-store.yaml
  - external-secret.yaml
  - postgres.yaml
  - configmap.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - policies.yaml

images:
  - name: backend
    newName: us-central1-docker.pkg.dev/ofirdevops/devops-repo/backend
    newTag: latest
  - name: frontend
    newName: us-central1-docker.pkg.dev/ofirdevops/devops-repo/frontend
    newTag: latest
